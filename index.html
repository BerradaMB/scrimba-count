<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">


</head>
<body>
    <div id="card">
        <div class="container">
            <h2 class="titel">home</h2>
            <div class="number"><p class="num" id="num-el">0</p></div>
            <div class="btn">
                <button class="btn-num" onclick="addOneHome()">+1</button>
                <button class="btn-num" onclick="addTwoHome()">+2</button>
                <button class="btn-num" onclick="addTreeHome()">+3</button>
            </div>
        </div>
        <div class="container">
            <h2 class="titel">away</h2>
            <div class="number"><p class="num" id="num-guest">0</p></div>
            <div class="btn" >
                <button class="btn-num" onclick="addOneGuest()">+1</button>
                <button class="btn-num" onclick="addTwoGuest()">+2</button>
                <button class="btn-num" onclick="addtreeGuest()">+3</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
